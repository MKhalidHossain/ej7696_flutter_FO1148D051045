name: Bug report
description: Report a reproducible defect in the Flutter app.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue.
        Please include enough detail for the team to reproduce the behavior quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Open the app
        2. Navigate to ...
        3. Tap ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share the environment where the issue occurred.
      placeholder: |
        - Flutter version:
        - Device / emulator:
        - OS version:
        - App build / branch:
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or videos
      description: Paste stack traces or attach screenshots if available.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this report.
          required: true
        - label: I can reproduce this issue on the current codebase.
          required: true
